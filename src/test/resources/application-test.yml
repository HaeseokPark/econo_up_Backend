spring:
  datasource:
    url: jdbc:h2:mem:econoup;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

app:
  curriculum:
    import-on-startup: false
    path: classpath:data/curriculum.xlsx
  google:
    client-id:
  jwt:
    secret: test-secret-must-be-at-least-thirty-two-bytes-long
